  function gtag() { dataLayer.push(arguments); }
  gtag('js', new Date());

  gtag('config', 'G-6C5XMEGR8C');

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var tables = document.querySelectorAll('#body-inner table');
    var contentImages = document.querySelectorAll('#body-inner img');

    tables.forEach(function (table) {
      if (!table.parentElement || !table.parentElement.classList.contains('table-scroll')) {
        var wrapper = document.createElement('div');
        wrapper.className = 'table-scroll';
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
      }

      var headerCells = table.querySelectorAll('thead th');
      if (!headerCells.length) {
        return;
      }

      table.classList.add('is-stacked-mobile');

      var labels = Array.prototype.map.call(headerCells, function (th) {
        return th.textContent.trim();
      });

      table.querySelectorAll('tbody tr').forEach(function (row) {
        row.querySelectorAll('td').forEach(function (cell, index) {
          cell.setAttribute('data-label', labels[index] || '');
        });
      });
    });

    contentImages.forEach(function (img) {
      if (img.classList.contains('inline') || img.closest('table') || img.closest('.gallery') || img.closest('figure')) {
        return;
      }

      img.classList.add('doc-media');

      var src = img.getAttribute('src') || '';
      var widthMatch = src.match(/[?&]width=([0-9]+)([a-z%]*)/i);
      var widthValue = widthMatch ? parseInt(widthMatch[1], 10) : NaN;

      img.classList.remove('media-sm', 'media-md', 'media-lg', 'media-xl');

      if (Number.isNaN(widthValue)) {
        img.classList.add('media-lg');
        return;
      }

      if (widthValue <= 25) {
        img.classList.add('media-sm');
      } else if (widthValue <= 40) {
        img.classList.add('media-md');
      } else if (widthValue <= 60) {
        img.classList.add('media-lg');
      } else {
        img.classList.add('media-xl');
      }
    });
  });
</script>
